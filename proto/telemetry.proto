// =============================================================================
//  @file telemetry.proto
//  @brief Определение gRPC-сервиса для управления параметрами системы.
//  @version 1.0
//  @date 2026-06-20
//  @author vladcrim
//
//  Данный файл описывает контракт между клиентом и сервером.
//  Содержит определения сообщений и методов для получения и установки параметров.
//  Версия API — v1.
// =============================================================================

syntax = "proto3";

package telemetry.v1;

import "google/rpc/status.proto";
import "google/protobuf/timestamp.proto";

// =============================================================================
//  Сообщения запросов и ответов
// =============================================================================

/**
 * @brief Запрос на получение значения параметра.
 *
 * Клиент передаёт имя параметра, значение которого необходимо получить.
 *
 * @example { "name": "temperature" }
 */
message GetParameterRequest {
    string name = 1; // Имя параметра (обязательное поле, не может быть пустым)
}

/**
 * @brief Ответ на запрос получения параметра.
 *
 * Сервер возвращает имя параметра, его текущее значение,
 * временную метку формирования ответа и статус операции.
 */
message GetParameterResponse {
    string name = 1;                              // Имя параметра (зеркально из запроса)
    string value = 2;                             // Значение параметра (например, "23.5")
    google.protobuf.Timestamp timestamp = 3;      // Время формирования ответа (UTC)
    google.rpc.Status status = 4;                 // Статус операции (OK или код ошибки)
}

/**
 * @brief Запрос на установку значения параметра.
 *
 * Клиент передаёт имя параметра, новое значение и уникальный идентификатор запроса.
 * Поле request_id используется для защиты от повторных запросов.
 *
 * @example { "name": "temperature", "value": "25.0", "request_id": "req-123" }
 */
message SetParameterRequest {
    string name = 1;        // Имя параметра (обязательное поле)
    string value = 2;       // Новое значение параметра (обязательное поле)
    string request_id = 3;  // Уникальный идентификатор запроса (защита от дублирования)
}

/**
 * @brief Ответ на запрос установки параметра.
 *
 * Сервер возвращает статус операции: OK или ошибка с пояснением.
 */
message SetParameterResponse {
    google.rpc.Status status = 1; // Статус операции
}

// =============================================================================
//  Определение gRPC-сервиса
// =============================================================================

/**
 * @brief Сервис управления параметрами.
 *
 * Предоставляет два метода для работы с параметрами системы:
 * - GetParameter — получение значения параметра по имени.
 * - SetParameter — установка значения параметра с проверкой уникальности запроса.
 */
service TelemetryService {
    /**
     * @brief Получить значение параметра.
     * @param request Имя параметра.
     * @return GetParameterResponse Значение параметра, время и статус.
     */
    rpc GetParameter(GetParameterRequest) returns (GetParameterResponse);

    /**
     * @brief Установить значение параметра.
     * @param request Имя, значение и уникальный ID запроса.
     * @return SetParameterResponse Статус операции.
     */
    rpc SetParameter(SetParameterRequest) returns (SetParameterResponse);
}